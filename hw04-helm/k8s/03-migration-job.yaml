apiVersion: batch/v1
kind: Job
metadata:
  name: user-service-migration
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: postgres:16-alpine
          command:
            - psql
            - -v
            - ON_ERROR_STOP=1
            - -c
            - |
              CREATE TABLE IF NOT EXISTS users (
                  id BIGSERIAL PRIMARY KEY,
                  username VARCHAR(256) NOT NULL,
                  first_name VARCHAR(256) NOT NULL DEFAULT '',
                  last_name VARCHAR(256) NOT NULL DEFAULT '',
                  email VARCHAR(256) NOT NULL DEFAULT '',
                  phone VARCHAR(64) NOT NULL DEFAULT ''
              );
          env:
            - name: PGHOST
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: DB_HOST
            - name: PGPORT
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: DB_PORT
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: DB_NAME
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: user-service-db
                  key: DB_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-service-db
                  key: DB_PASSWORD
