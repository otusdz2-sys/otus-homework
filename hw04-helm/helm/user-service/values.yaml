replicaCount: 2

image:
  repository: cornsc/user-service
  tag: "1.0"
  pullPolicy: IfNotPresent

service:
  port: 8000

ingress:
  className: nginx
  host: arch.homework
  path: /user

config:
  dbHost: postgres-postgresql
  dbPort: "5432"
  dbName: users_db

db:
  user: app
  password: apppass123

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi
